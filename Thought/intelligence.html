<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>how a machine learns to read</title>
    <meta name="description" content="A real neural network compiled from Rust to WebAssembly, living in this page. Draw a digit, watch the signal flow, and teach it when it's wrong.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../sun.ico" type="image/x-icon">
<style>
        :root {
            --bg: #07070b;
            --ink: #eceae4;
            --body: #c9c7d2;
            --mut: #8e8c99;
            --vio: #8b7cff;
            --vio2: #b9adff;
            --amber: #ffc466;
            --pink: #ff6f9c;
            --line: rgba(255, 255, 255, 0.08);
            --card: rgba(255, 255, 255, 0.027);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--body);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }

        body::before {
            width: 70vmax; height: 70vmax;
            left: -28vmax; top: -30vmax;
            background: radial-gradient(circle, rgba(139, 124, 255, 0.13), transparent 62%);
        }

        body::after {
            width: 60vmax; height: 60vmax;
            right: -25vmax; bottom: -28vmax;
            background: radial-gradient(circle, rgba(255, 196, 102, 0.07), transparent 60%);
        }

        main { position: relative; z-index: 1; }

        #progress {
            position: fixed; top: 0; left: 0;
            height: 2px; width: 0;
            background: linear-gradient(90deg, var(--vio), var(--amber));
            z-index: 60;
        }

        .home {
            position: fixed; top: 18px; left: 20px; z-index: 50;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--mut);
            text-decoration: none;
            padding: 7px 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(7, 7, 11, 0.6);
            backdrop-filter: blur(6px);
            transition: color 0.25s ease, border-color 0.25s ease;
        }

        .home:hover { color: var(--ink); border-color: rgba(255,255,255,0.25); }

        /* ---------- hero ---------- */
        .hero {
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            padding: 40px 18px;
        }

        #hero-net { position: absolute; inset: 0; width: 100%; height: 100%; }

        .hero-inner { position: relative; max-width: 880px; }

        .kicker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--vio2);
            margin: 0 0 26px;
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: clamp(2.9rem, 9vw, 6.2rem);
            line-height: 1.04;
            letter-spacing: -0.015em;
            color: var(--ink);
            margin: 0 0 26px;
        }

        .hero h1 em { font-style: italic; font-weight: 400; color: var(--vio2); }

        .lede {
            max-width: 560px;
            margin: 0 auto 34px;
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--body);
        }

        .chips { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        .chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.74rem;
            color: var(--vio2);
            border: 1px solid rgba(139, 124, 255, 0.3);
            border-radius: 999px;
            padding: 7px 15px;
            background: rgba(139, 124, 255, 0.06);
        }

        .scroll-cue {
            position: absolute;
            bottom: 26px; left: 50%;
            transform: translateX(-50%);
            width: 1px; height: 56px;
            background: linear-gradient(180deg, transparent, var(--vio));
            overflow: visible;
        }

        .scroll-cue::after {
            content: '';
            position: absolute;
            left: -2px; top: 0;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--vio2);
            animation: cue 2.4s ease-in-out infinite;
        }

        @keyframes cue {
            0% { top: 0; opacity: 0; }
            30% { opacity: 1; }
            100% { top: 52px; opacity: 0; }
        }

        /* ---------- chapters ---------- */
        .chapter {
            max-width: 740px;
            margin: 0 auto;
            padding: 110px 22px 0;
        }

        .chapter.wide { max-width: 1080px; }

        .chapnum {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.35em;
            color: var(--vio);
            display: block;
            margin-bottom: 14px;
        }

        h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: clamp(1.9rem, 4.6vw, 2.7rem);
            line-height: 1.12;
            letter-spacing: -0.01em;
            color: var(--ink);
            margin: 0 0 22px;
        }

        p { line-height: 1.85; margin: 0 0 18px; font-size: 1.02rem; }

        strong { font-weight: 600; color: var(--ink); }
        em { color: var(--vio2); }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            margin: 30px 0 0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }

        button {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 0.92rem;
            color: var(--vio2);
            background: rgba(139, 124, 255, 0.07);
            border: 1px solid rgba(139, 124, 255, 0.38);
            border-radius: 999px;
            padding: 9px 20px;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease, transform 0.08s ease;
        }

        button:hover { background: rgba(139, 124, 255, 0.18); color: #fff; }
        button:active { transform: scale(0.97); }

        input[type="range"] { accent-color: var(--vio); }

        /* ch 1: neuron */
        .neuron-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 30px; align-items: center; }
        @media (max-width: 720px) { .neuron-grid { grid-template-columns: 1fr; } }

        .srow { display: grid; grid-template-columns: 92px 1fr 46px; align-items: center; gap: 12px; margin: 12px 0; }
        .srow label { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--mut); }
        .srow output { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--ink); text-align: right; }

        #neuron-svg { width: 100%; height: auto; display: block; }
        #neuron-formula {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--mut);
            text-align: center;
            margin-top: 10px;
            min-height: 1.4em;
        }

        /* ch 2: features */
        .features-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }

        canvas.feature {
            width: 92px; height: 92px;
            image-rendering: pixelated;
            border-radius: 12px;
            border: 1px solid var(--line);
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        canvas.feature:hover { transform: scale(1.6); border-color: rgba(139,124,255,0.6); z-index: 5; position: relative; }

        .legend { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--mut); margin-top: 18px; }
        .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin: 0 6px -1px 16px; }

        /* ch 3: bowl */
        #bowl { width: 100%; height: auto; display: block; border-radius: 14px; }

        .bowl-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 16px; }

        #bowl-stats { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--ink); margin-left: auto; }

        #lr-warn { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--amber); min-height: 1.3em; margin-top: 10px; }

        /* ch 4: the lab */
        .lab-grid { display: grid; grid-template-columns: 340px 1fr; gap: 34px; align-items: start; }
        @media (max-width: 880px) { .lab-grid { grid-template-columns: 1fr; justify-items: center; } }

        #pad {
            width: 320px; height: 320px; max-width: 100%;
            background: #0d0d14;
            border: 1px solid rgba(139, 124, 255, 0.35);
            border-radius: 18px;
            cursor: crosshair;
            touch-action: none;
            display: block;
            box-shadow: 0 0 50px rgba(139, 124, 255, 0.07) inset;
        }

        .pad-side { width: 320px; max-width: 100%; }
        .pad-tools { display: flex; gap: 10px; margin-top: 14px; align-items: center; justify-content: space-between; }

        .verdict-box { text-align: center; margin-top: 8px; min-height: 150px; }

        #verdict {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 5.6rem;
            line-height: 1.1;
            color: var(--ink);
            text-shadow: 0 0 34px rgba(139, 124, 255, 0.55);
        }

        #verdict.idle { font-size: 1.4rem; color: var(--mut); font-style: italic; font-weight: 400; text-shadow: none; padding-top: 34px; }

        #confidence { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--mut); min-height: 1.4em; }

        #netviz { width: 100%; height: auto; display: block; }

        .viz-label { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--mut); margin: 0 0 8px; }

        #teach-row { margin-top: 22px; opacity: 0.3; pointer-events: none; transition: opacity 0.3s ease; }
        #teach-row.armed { opacity: 1; pointer-events: auto; }

        .digit-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .digit-btns button { width: 46px; padding: 9px 0; font-family: 'JetBrains Mono', monospace; }

        #teach-note { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--amber); min-height: 1.5em; margin-top: 12px; }

        .teach-meta {
            margin-top: 16px;
            display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
            font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--mut);
        }

        #taught-count { color: var(--ink); }
        #reset-btn { font-size: 0.74rem; padding: 5px 13px; opacity: 0.7; }
        #restored-note { font-style: italic; color: rgba(139, 124, 255, 0.85); }

        #spark-wrap { margin-top: 18px; display: none; }
        #spark-wrap.show { display: block; }
        #loss-spark { width: 240px; height: 48px; display: block; }

        /* ch 5: code */
        pre {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 22px;
            overflow-x: auto;
            margin: 0;
            line-height: 1.7;
        }

        code { font-family: 'JetBrains Mono', monospace; font-size: 0.84rem; color: var(--body); }
        code .k { color: var(--vio2); }
        code .s { color: var(--amber); }
        code .c { color: var(--mut); font-style: italic; }
        code .n { color: var(--pink); }

        /* epilogue */
        .epilogue {
            max-width: 640px;
            margin: 0 auto;
            padding: 130px 22px 60px;
            text-align: center;
        }

        .epilogue p.big {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(1.4rem, 3.4vw, 1.9rem);
            line-height: 1.5;
            color: var(--ink);
        }

        footer {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--mut);
            padding: 0 0 36px;
        }

        footer a { color: var(--vio2); text-decoration: none; }
        footer a:hover { color: #fff; }

        /* reveal on scroll */
        .reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .reveal.visible { opacity: 1; transform: none; }

        a:focus-visible, button:focus-visible, input:focus-visible {
            outline: 2px solid var(--vio2);
            outline-offset: 3px;
            border-radius: 4px;
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .reveal { opacity: 1; transform: none; transition: none; }
            .scroll-cue::after { animation: none; }
            canvas.feature, button, #teach-row { transition: none; }
        }
            #numbers { width: 100%; height: auto; display: block; border-radius: 12px; }
    </style>
</head>
<body data-page="nn">
    <script type="module">import init from '/app/site_wasm.js'; init();</script>
</body>
</html>
